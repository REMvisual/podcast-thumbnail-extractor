<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Thumbnail Extractor logo">
  <defs>
    <linearGradient id="heatLogo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#f7931e"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="16" fill="#0A0A0A" stroke="#ff6b35" stroke-opacity="0.25" stroke-width="1"/>
  <!-- three candidate frames, middle one "top pick" -->
  <rect x="16" y="48" width="28" height="20" fill="#1A1A1A" stroke="#555555" stroke-width="1"/>
  <rect x="50" y="40" width="28" height="36" fill="#1a0f08" stroke="url(#heatLogo)" stroke-width="1.75"/>
  <rect x="53" y="43" width="22" height="30" fill="url(#heatLogo)" fill-opacity="0.14"/>
  <rect x="84" y="48" width="28" height="20" fill="#1A1A1A" stroke="#555555" stroke-width="1"/>
  <!-- top pick marker -->
  <text x="64" y="34" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="8" font-weight="700" fill="#ff6b35" text-anchor="middle" letter-spacing="0.18em">0.94</text>
  <!-- label -->
  <text x="64" y="114" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="9" fill="#888888" text-anchor="middle" letter-spacing="0.18em">TE / CV</text>
</svg>
